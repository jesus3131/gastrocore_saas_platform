<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>POS Terminal - GastroEnterprise</title>
<script src="../../shared/design-tokens.js"></script>
<link rel="stylesheet" href="../css/pos-order-taking.css">
<script src="../js/pos-order-taking.js"></script>
</head>
<body class="bg-background text-on-background font-body-md text-body-md antialiased overflow-hidden">
<!-- Main App Container -->
<div class="pos-layout">
<!-- TopAppBar (Row 1, Col 2-3) -->
<header class="col-start-2 col-end-4 row-start-1 bg-surface dark:bg-surface-container-lowest border-b border-outline-variant dark:border-outline flat no shadows flex justify-between items-center h-16 px-lg sticky z-40">
<div class="flex items-center gap-md w-1/3">
<div class="relative w-full max-w-md">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline" data-icon="search">search</span>
<input class="w-full h-10 pl-10 pr-4 rounded bg-surface-container-low border border-outline-variant text-on-surface focus:border-primary focus:ring-2 focus:ring-primary/20 transition-all font-body-sm text-body-sm touch-target" placeholder="Search menu..." type="text"/>
</div>
</div>
<div class="flex items-center justify-center">
<span class="font-headline-md text-headline-md text-primary dark:text-inverse-primary font-black">GastroEnterprise</span>
</div>
<div class="flex items-center justify-end gap-sm w-1/3 text-primary dark:text-inverse-primary font-label-md text-label-md">
<button aria-label="Notifications" class="p-2 rounded hover:text-primary dark:hover:text-inverse-primary transition-all hover:bg-surface-container touch-target">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
<button aria-label="Storefront" class="p-2 rounded hover:text-primary dark:hover:text-inverse-primary transition-all hover:bg-surface-container touch-target">
<span class="material-symbols-outlined" data-icon="storefront">storefront</span>
</button>
<div class="ml-sm w-10 h-10 rounded-full bg-surface-container-highest overflow-hidden border border-outline-variant">
<img alt="Manager Profile" class="w-full h-full object-cover" data-alt="A professional headshot of a restaurant manager wearing a crisp white shirt, smiling slightly against a bright, modern, well-lit kitchen background. Corporate modern aesthetic, high resolution, soft natural lighting." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC3P4_440MI7enLm3R9LwTpC7LAQFnlpVNTZ30lJb5uL3oFPLSWrF218VR8ovr0G75-T3qe0pz1633a2qRffGlLJduputqEDrkAhcovbsWVbRsQ2ex56CtDI_apLCnydpn0e7m5e3jwS8iMUTqvVcA_zfguKkycU7nreztKmzEIv_RINO7TwYgfpibpsLV8CJMc6PoZml_Z-QR96qEIMsa7nB_XvanQ6s7FsSiz3lMrTeICif1ELczqBI_iUonn8uD6-GFa2V88O8HO"/>
</div>
</div>
</header>
<!-- SideNavBar (Row 1-2, Col 1) -->
<nav class="col-start-1 col-end-2 row-start-1 row-end-3 bg-surface-container-low dark:bg-inverse-surface border-r border-outline-variant flex flex-col h-full py-md z-50">
<div class="px-md mb-lg flex items-center gap-sm">
<div class="w-10 h-10 rounded bg-primary flex items-center justify-center text-on-primary">
<span class="material-symbols-outlined" data-icon="restaurant">restaurant</span>
</div>
<div class="sidebar-text">
<h1 class="font-headline-md text-headline-md text-primary dark:text-inverse-primary font-bold leading-none truncate">GastroEnterprise</h1>
<span class="font-label-md text-label-md text-on-surface-variant truncate block">Enterprise Management</span>
</div>
</div>
<div class="flex-1 overflow-y-auto no-scrollbar px-sm space-y-1">
<!-- Active Item -->
<a class="flex items-center gap-md px-sm py-3 rounded text-primary dark:text-inverse-primary font-bold border-r-4 border-primary dark:border-inverse-primary bg-surface-container-high dark:bg-surface-variant transition-colors duration-200 touch-target" href="#">
<span class="material-symbols-outlined" data-icon="point_of_sale" data-weight="fill">point_of_sale</span>
<span class="font-label-md text-label-md sidebar-text">POS</span>
</a>
<a class="flex items-center gap-md px-sm py-3 rounded text-on-surface-variant dark:text-surface-variant hover:bg-surface-container-high dark:hover:bg-surface-variant transition-colors duration-200 touch-target" href="#">
<span class="material-symbols-outlined" data-icon="inventory_2">inventory_2</span>
<span class="font-label-md text-label-md sidebar-text">Inventory</span>
</a>
<a class="flex items-center gap-md px-sm py-3 rounded text-on-surface-variant dark:text-surface-variant hover:bg-surface-container-high dark:hover:bg-surface-variant transition-colors duration-200 touch-target" href="#">
<span class="material-symbols-outlined" data-icon="analytics">analytics</span>
<span class="font-label-md text-label-md sidebar-text">Analytics</span>
</a>
<a class="flex items-center gap-md px-sm py-3 rounded text-on-surface-variant dark:text-surface-variant hover:bg-surface-container-high dark:hover:bg-surface-variant transition-colors duration-200 touch-target" href="#">
<span class="material-symbols-outlined" data-icon="badge">badge</span>
<span class="font-label-md text-label-md sidebar-text">Personnel</span>
</a>
</div>
<div class="mt-auto px-sm pt-md border-t border-outline-variant">
<a class="flex items-center gap-md px-sm py-3 rounded text-on-surface-variant dark:text-surface-variant hover:bg-surface-container-high dark:hover:bg-surface-variant transition-colors duration-200 touch-target" href="#">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
<span class="font-label-md text-label-md sidebar-text">Settings</span>
</a>
</div>
</nav>
<!-- Center Canvas: Menu Grid (Row 2, Col 2) -->
<main class="col-start-2 row-start-2 bg-background p-lg overflow-y-auto no-scrollbar flex flex-col gap-lg">
<!-- Category Filter Row -->
<div id="category-filter" class="flex gap-sm overflow-x-auto pb-sm no-scrollbar"></div>
<!-- Items Grid -->
<div id="menu-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-md"></div>
</main>
<!-- Right Sidebar: Ticket/Order Summary (Row 2, Col 3) -->
<aside class="col-start-3 row-start-2 bg-surface border-l border-outline-variant flex flex-col h-full z-10 shadow-[-4px_0_24px_rgba(0,0,0,0.02)]">
<!-- Ticket Header -->
<div id="ticket-header" class="p-md border-b border-outline-variant bg-surface-container-lowest"></div>
<!-- Order Items List -->
<div id="order-items" class="flex-1 overflow-y-auto p-sm space-y-2 bg-background"></div>
<!-- Financial Summary -->
    <div id="financial-summary" class="p-md bg-surface-container-lowest border-t border-outline-variant"></div>
</aside>
</div>
</body></html>
