<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Checkout - Pro-Service Hospitality</title>
<script src="../../shared/design-tokens.js"></script>
<link rel="stylesheet" href="../css/pos-checkout.css">
<script src="../js/pos-checkout.js"></script>
</head>
<body class="bg-background text-on-background font-body-md h-screen flex overflow-hidden">
<!-- TopNavBar Omitted: Transactional Checkout Screen -->
<!-- SideNavBar Omitted: Transactional Checkout Screen -->
<main class="flex-1 flex flex-col h-full relative z-0 overflow-y-auto">
<!-- Header -->
<header class="bg-surface border-b border-surface-variant px-lg py-md flex justify-between items-center shrink-0">
<div class="flex items-center gap-sm">
<button class="text-on-surface-variant hover:text-primary transition-colors flex items-center justify-center p-xs rounded-lg hover:bg-surface-container-high">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
<div>
<h1 class="font-headline-md text-headline-md text-on-surface">Checkout</h1>
<p id="checkout-header-info" class="font-body-sm text-body-sm text-on-surface-variant"></p>
</div>
</div>
<div class="flex items-center gap-md">
<span class="inline-flex items-center gap-xs px-sm py-xs rounded-full bg-[#10b981]/10 text-[#10b981] font-label-md text-label-md">
<span class="material-symbols-outlined text-[16px]">check_circle</span>
                    Mesa Activa
                </span>
</div>
</header>
<!-- Main Content Split -->
<div class="flex-1 flex flex-col lg:flex-row overflow-hidden">
<!-- Left Panel: Order Summary -->
<section class="lg:w-1/3 w-full bg-surface-container-low border-r border-surface-variant flex flex-col h-full overflow-hidden">
<div class="p-md bg-surface-container-highest/30 border-b border-surface-variant shrink-0">
<h2 class="font-body-lg text-body-lg font-semibold text-on-surface">Resumen de Cuenta</h2>
</div>
<!-- Order Items -->
<div id="checkout-items" class="flex-1 overflow-y-auto p-md space-y-sm"></div>
<!-- Totals -->
<div id="checkout-totals" class="p-md bg-surface border-t border-surface-variant shrink-0"></div>
</section>
<!-- Right Panel: Payment Management -->
<section class="lg:w-2/3 w-full bg-surface flex flex-col h-full overflow-y-auto">
<div class="p-lg max-w-3xl mx-auto w-full space-y-xl">
<!-- 1. Split Bill Section -->
<div>
<h3 class="font-body-lg text-body-lg font-semibold text-on-surface mb-md">División de Cuenta</h3>
<div class="flex flex-wrap gap-sm mb-md">
<button class="flex-1 min-w-[120px] py-sm px-md rounded-lg border-2 border-primary bg-primary/5 text-primary font-body-md text-body-md font-medium flex items-center justify-center gap-xs">
<span class="material-symbols-outlined text-[20px]">pie_chart</span>
                                Igualitario
                            </button>
<button class="flex-1 min-w-[120px] py-sm px-md rounded-lg border border-surface-variant bg-surface hover:bg-surface-container-low text-on-surface-variant font-body-md text-body-md flex items-center justify-center gap-xs transition-colors">
<span class="material-symbols-outlined text-[20px]">list_alt</span>
                                Por Artículos
                            </button>
<button class="flex-1 min-w-[120px] py-sm px-md rounded-lg border border-surface-variant bg-surface hover:bg-surface-container-low text-on-surface-variant font-body-md text-body-md flex items-center justify-center gap-xs transition-colors">
<span class="material-symbols-outlined text-[20px]">edit</span>
                                Personalizado
                            </button>
</div>
<!-- Split Example -->
<div id="split-bill" class="bg-surface-container-low rounded-lg p-md flex items-center justify-between border border-surface-variant"></div>
</div>
<!-- 2. Payment Methods -->
<div>
<h3 class="font-body-lg text-body-lg font-semibold text-on-surface mb-md">Método de Pago</h3>
<div class="grid grid-cols-2 md:grid-cols-4 gap-md">
<!-- Efectivo -->
<label class="cursor-pointer relative">
<input class="peer sr-only" name="payment_method" type="radio"/>
<div class="interactive-card h-full p-md rounded-lg border border-surface-variant bg-surface flex flex-col items-center justify-center gap-sm peer-checked:border-primary peer-checked:bg-primary/5 peer-checked:ring-1 peer-checked:ring-primary text-on-surface-variant peer-checked:text-primary">
<span class="material-symbols-outlined text-[32px]">payments</span>
<span class="font-body-sm text-body-sm text-center">Efectivo</span>
</div>
</label>
<!-- Tarjeta -->
<label class="cursor-pointer relative">
<input checked="" class="peer sr-only" name="payment_method" type="radio"/>
<div class="interactive-card h-full p-md rounded-lg border border-surface-variant bg-surface flex flex-col items-center justify-center gap-sm peer-checked:border-primary peer-checked:bg-primary/5 peer-checked:ring-1 peer-checked:ring-primary text-on-surface-variant peer-checked:text-primary">
<span class="material-symbols-outlined text-[32px]">credit_card</span>
<span class="font-body-sm text-body-sm text-center">Tarjeta de Crédito</span>
<span class="absolute top-2 right-2 material-symbols-outlined text-[16px] text-primary opacity-0 peer-checked:opacity-100">check_circle</span>
</div>
</label>
<!-- Transferencia -->
<label class="cursor-pointer relative">
<input class="peer sr-only" name="payment_method" type="radio"/>
<div class="interactive-card h-full p-md rounded-lg border border-surface-variant bg-surface flex flex-col items-center justify-center gap-sm peer-checked:border-primary peer-checked:bg-primary/5 peer-checked:ring-1 peer-checked:ring-primary text-on-surface-variant peer-checked:text-primary">
<span class="material-symbols-outlined text-[32px]">account_balance</span>
<span class="font-body-sm text-body-sm text-center">Transferencia</span>
</div>
</label>
<!-- Wallet -->
<label class="cursor-pointer relative">
<input class="peer sr-only" name="payment_method" type="radio"/>
<div class="interactive-card h-full p-md rounded-lg border border-surface-variant bg-surface flex flex-col items-center justify-center gap-sm peer-checked:border-primary peer-checked:bg-primary/5 peer-checked:ring-1 peer-checked:ring-primary text-on-surface-variant peer-checked:text-primary">
<span class="material-symbols-outlined text-[32px]">wallet</span>
<span class="font-body-sm text-body-sm text-center">Wallet Digital</span>
</div>
</label>
</div>
</div>
<!-- 3. Billing Details -->
<div class="bg-surface-container-low rounded-lg border border-surface-variant overflow-hidden">
<div class="p-md flex items-center justify-between bg-surface-container-highest/30 cursor-pointer" onclick="document.getElementById('billing-form').classList.toggle('hidden')">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary">receipt_long</span>
<h3 class="font-body-md text-body-md font-semibold text-on-surface">Factura Electrónica</h3>
</div>
<div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
<input checked="" class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer border-primary bg-primary right-0" id="toggle" name="toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-5 rounded-full bg-primary/20 cursor-pointer" for="toggle"></label>
</div>
</div>
<div class="p-md space-y-md border-t border-surface-variant bg-surface" id="billing-form">
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs">RUC / NIT</label>
<input id="billing-ruc" class="w-full bg-surface border border-outline-variant rounded-lg px-sm py-sm font-body-sm text-body-sm text-on-surface focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all" type="text" value="0928374651001"/>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs">Razón Social</label>
<input id="billing-name" class="w-full bg-surface border border-outline-variant rounded-lg px-sm py-sm font-body-sm text-body-sm text-on-surface focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all" type="text" value="Juan Pérez Delgado"/>
</div>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-xs">Correo Electrónico</label>
<input id="billing-email" class="w-full bg-surface border border-outline-variant rounded-lg px-sm py-sm font-body-sm text-body-sm text-on-surface focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all" type="email" value="juan.perez@email.com"/>
</div>
</div>
</div>
</div>
<!-- Bottom Action -->
<div class="mt-auto p-lg border-t border-surface-variant bg-surface sticky bottom-0 z-10 ambient-shadow">
<div class="max-w-3xl mx-auto flex items-center justify-between">
<div class="hidden md:block text-on-surface-variant">
<p class="font-body-sm text-body-sm">Monto a cobrar</p>
<p id="monto-cobrar" class="font-headline-md text-headline-md font-data-mono text-on-surface"></p>
</div>
<button class="w-full md:w-auto bg-primary text-on-primary font-body-lg text-body-lg font-medium py-md px-xl rounded-lg hover:bg-primary-fixed-variant transition-colors flex items-center justify-center gap-sm shadow-md">
<span class="material-symbols-outlined">point_of_sale</span>
                            Finalizar y Cerrar Mesa
                        </button>
</div>
</div>
</section>
</div>
</main>
<link rel="stylesheet" href="../css/pos-checkout.css">
<script>
  document.getElementById('checkout-header-info').textContent = checkoutInfo.table + ' • Comanda #' + checkoutInfo.orderNumber;
  function renderCheckoutItems() {
    const c = document.getElementById('checkout-items');
    if (!c) return;
    c.innerHTML = checkoutItems.map(item => '<div class="flex justify-between items-start py-sm border-b border-surface-variant/50"><div class="flex gap-sm"><span class="font-data-mono text-data-mono text-on-surface-variant bg-surface-container py-xs px-sm rounded">' + item.qty + 'x</span><div><p class="font-body-md text-body-md font-medium text-on-surface">' + item.name + '</p>' + (item.modifiers.length ? '<p class="font-body-sm text-body-sm text-on-surface-variant">' + item.modifiers.join(', ') + '</p>' : '') + '</div></div><span class="font-data-mono text-data-mono text-on-surface">$' + item.price.toFixed(2) + '</span></div>').join('');
  }
  function renderCheckoutTotals() {
    const c = document.getElementById('checkout-totals');
    if (!c) return;
    c.innerHTML = '<div class="space-y-sm mb-md"><div class="flex justify-between text-on-surface-variant"><span class="font-body-sm text-body-sm">Subtotal</span><span class="font-data-mono text-data-mono">$' + checkoutTotals.subtotal.toFixed(2) + '</span></div><div class="flex justify-between text-on-surface-variant"><span class="font-body-sm text-body-sm">IVA (' + checkoutTotals.vatRate + ')</span><span class="font-data-mono text-data-mono">$' + checkoutTotals.vat.toFixed(2) + '</span></div><div class="flex justify-between text-on-surface-variant"><span class="font-body-sm text-body-sm">Propina (' + checkoutTotals.tipRate + ')</span><span class="font-data-mono text-data-mono">$' + checkoutTotals.tip.toFixed(2) + '</span></div></div><div class="flex justify-between items-center py-sm border-t border-surface-variant"><span class="font-headline-md text-headline-md text-on-surface">Total</span><span class="font-headline-md text-headline-md font-data-mono text-primary">$' + checkoutTotals.total.toFixed(2) + '</span></div>';
  }
  function renderSplitBill() {
    const c = document.getElementById('split-bill');
    if (!c) return;
    c.innerHTML = '<div class="flex items-center gap-sm"><span class="material-symbols-outlined text-on-surface-variant">group</span><span class="font-body-md text-body-md text-on-surface">Dividido en ' + splitBill.people + ' personas</span></div><span class="font-data-mono text-data-mono text-primary font-semibold">$' + splitBill.perPerson.toFixed(2) + ' / persona</span>';
  }
  document.getElementById('billing-ruc').value = billingData.ruc;
  document.getElementById('billing-name').value = billingData.businessName;
  document.getElementById('billing-email').value = billingData.email;
  document.getElementById('monto-cobrar').textContent = '$' + splitBill.perPerson.toFixed(2);
  renderCheckoutItems();
  renderCheckoutTotals();
  renderSplitBill();
</script>
</body></html>
