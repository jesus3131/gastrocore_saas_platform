apiVersion: v1
kind: Service
metadata:
  name: restopro-backend
  namespace: restopro
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: restopro-enterprise
spec:
  selector:
    app: backend
  ports:
    - port: 4000
      targetPort: 4000
      name: http
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: restopro
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/part-of: restopro-enterprise
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: backend
          image: ghcr.io/restopro/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
          envFrom:
            - configMapRef:
                name: restopro-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: restopro-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: restopro-secrets
                  key: JWT_SECRET
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: restopro-secrets
                  key: REDIS_URL
            - name: SMTP_HOST
              valueFrom:
                secretKeyRef:
                  name: restopro-secrets
                  key: SMTP_HOST
            - name: SMTP_PORT
              valueFrom:
                secretKeyRef:
                  name: restopro-secrets
                  key: SMTP_PORT
            - name: SMTP_USER
              valueFrom:
                secretKeyRef:
                  name: restopro-secrets
                  key: SMTP_USER
            - name: SMTP_PASS
              valueFrom:
                secretKeyRef:
                  name: restopro-secrets
                  key: SMTP_PASS
            - name: EMAIL_FROM
              valueFrom:
                secretKeyRef:
                  name: restopro-secrets
                  key: EMAIL_FROM
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
