apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: restopro-ingress
  namespace: restopro
  labels:
    app.kubernetes.io/name: restopro
    app.kubernetes.io/part-of: restopro-enterprise
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - restopro.example.com
      secretName: restopro-tls
  rules:
    - host: restopro.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: restopro-backend
                port:
                  number: 4000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: restopro-frontend
                port:
                  number: 80
