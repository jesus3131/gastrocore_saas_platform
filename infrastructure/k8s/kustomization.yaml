apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: restopro

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - postgres-statefulset.yaml
  - redis-deployment.yaml
  - backend-deployment.yaml
  - frontend-deployment.yaml
  - ingress.yaml

labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/managed-by: kustomize
      app.kubernetes.io/part-of: restopro-enterprise

images:
  - name: ghcr.io/restopro/backend
    newTag: latest
  - name: ghcr.io/restopro/frontend
    newTag: latest
