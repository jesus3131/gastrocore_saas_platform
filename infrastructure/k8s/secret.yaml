apiVersion: v1
kind: Secret
metadata:
  name: restopro-secrets
  namespace: restopro
  labels:
    app.kubernetes.io/name: restopro
    app.kubernetes.io/part-of: restopro-enterprise
type: Opaque
stringData:
  DB_PASSWORD: "CHANGE_ME_DB_PASSWORD"
  DATABASE_URL: "postgresql://restopro:CHANGE_ME_DB_PASSWORD@restopro-postgres:5432/restopro?schema=public"
  REDIS_URL: "redis://restopro-redis:6379"
  JWT_SECRET: "CHANGE_ME_JWT_SECRET_MIN_32_CHARS"
  SMTP_HOST: "smtp.mailtrap.io"
  SMTP_PORT: "2525"
  SMTP_USER: "CHANGE_ME_SMTP_USER"
  SMTP_PASS: "CHANGE_ME_SMTP_PASS"
  EMAIL_FROM: "noreply@restopro.com"
